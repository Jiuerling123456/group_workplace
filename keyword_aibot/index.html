<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dify AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .chat-header .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            opacity: 0.9;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
        }

        .status-dot.offline {
            background: #f87171;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 90%;
            animation: fadeIn 0.3s ease;
        }

        .message.bot {
            max-width: 95%;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.bot .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.user .message-avatar {
            background: #e5e7eb;
            color: #374151;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
            font-size: 14px;
        }

        .message.bot .message-content {
            background: #f3f4f6;
            color: #1f2937;
        }

        .message.bot .message-content h2 {
            font-size: 15px;
            font-weight: 600;
            color: #667eea;
            margin: 12px 0 6px 0;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 4px;
        }

        .message.bot .message-content h3 {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin: 8px 0 4px 0;
        }

        .message.bot .message-content strong {
            color: #1f2937;
        }

        .message.bot .message-content .paper-block {
            background: white;
            border-radius: 8px;
            padding: 12px 14px;
            margin: 10px 0;
            border-left: 3px solid #667eea;
        }

        .message.bot .message-content .paper-title {
            font-weight: 600;
            color: #667eea;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .message.bot .message-content .paper-authors {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .message.bot .message-content .paper-summary {
            font-size: 13px;
            color: #4b5563;
            line-height: 1.6;
        }

        .message.bot .message-content .paper-published {
            font-size: 11px;
            color: #9ca3af;
            margin-bottom: 2px;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message.bot:hover .message-actions {
            opacity: 1;
        }

        .message-actions button {
            background: none;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 12px;
            color: #6b7280;
            transition: all 0.2s;
        }

        .message-actions button:hover {
            background: #f3f4f6;
        }

        .message-actions button.active {
            color: #667eea;
            border-color: #667eea;
            background: #ede9fe;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9ca3af;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        .chat-input-area {
            padding: 16px 24px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 15px;
            resize: none;
            outline: none;
            font-family: inherit;
            max-height: 120px;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s, transform 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .new-chat-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #9ca3af;
            text-align: center;
            gap: 12px;
        }

        .empty-state .icon {
            font-size: 48px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-weight: 500;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>📚 学术关键词研究助手</h1>
            <div style="display:flex;align-items:center;gap:12px;">
                <div class="status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">就绪</span>
                </div>
                <button class="new-chat-btn" onclick="startNewChat()">+ 新对话</button>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="empty-state">
                <div class="icon">💬</div>
                <h3>学术关键词研究助手</h3>
                <p>输入您的研究关键词，获取专业的学术分析</p>
            </div>
        </div>
        <div class="chat-input-area">
            <textarea
                class="chat-input"
                id="chatInput"
                placeholder="输入学术关键词，如：machine learning, NLP..."
                rows="1"
                onkeydown="handleKeyDown(event)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13" />
                    <path d="M22 2L15 22L11 13L2 9L22 2Z" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const API_BASE_URL = 'https://api.dify.ai/v1';
        const API_KEY = 'app-2m9Y7trKlbfSXl1Imv5or15v';

        // ========== 状态 ==========
        let isProcessing = false;
        let currentWorkflowRunId = null;

        // ========== DOM 元素 ==========
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // ========== 工具函数 ==========
        function setStatus(online, text) {
            statusDot.className = 'status-dot' + (online ? '' : ' offline');
            statusText.textContent = text;
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeEmptyState() {
            const emptyState = chatMessages.querySelector('.empty-state');
            if (emptyState) emptyState.remove();
        }

        function addMessage(role, content, isHtml = false) {
            removeEmptyState();
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            const displayContent = isHtml ? content : formatMessageContent(content);
            msgDiv.innerHTML = `
                <div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div>
                    <div class="message-content">${displayContent}</div>
                    ${role === 'bot' ? '<div class="message-actions"><button class="like-btn" title="点赞">👍</button><button class="dislike-btn" title="点踩">👎</button><button class="copy-btn" title="复制">📋</button></div>' : ''}
                </div>
            `;
            chatMessages.appendChild(msgDiv);
            scrollToBottom();

            // 绑定操作按钮事件
            if (role === 'bot') {
                const actions = msgDiv.querySelector('.message-actions');
                const likeBtn = actions.querySelector('.like-btn');
                const dislikeBtn = actions.querySelector('.dislike-btn');
                const copyBtn = actions.querySelector('.copy-btn');

                likeBtn.addEventListener('click', function () {
                    this.classList.toggle('active');
                    dislikeBtn.classList.remove('active');
                });

                dislikeBtn.addEventListener('click', function () {
                    this.classList.toggle('active');
                    likeBtn.classList.remove('active');
                });

                copyBtn.addEventListener('click', function () {
                    const text = msgDiv.querySelector('.message-content').textContent;
                    navigator.clipboard.writeText(text).then(() => {
                        copyBtn.textContent = '✅';
                        setTimeout(() => { copyBtn.textContent = '📋'; }, 1500);
                    });
                });
            }

            return msgDiv;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== 格式化消息内容（Markdown 风格） ==========
        function formatMessageContent(text) {
            if (!text) return '';
            let html = escapeHtml(text);

            // 解析论文条目：Published: date\nTitle: ...\nAuthors: ...\nSummary: ...
            // 先处理 "- Published:" 开头的条目
            html = html.replace(/- (Published:.*?)(?=\n- Published:|\n*$)/gs, function (match) {
                let block = match;
                // 提取 Published
                block = block.replace(/Published:\s*(.+)/, '<div class="paper-published">📅 Published: $1</div>');
                // 提取 Title
                block = block.replace(/Title:\s*(.+)/, '<div class="paper-title">$1</div>');
                // 提取 Authors
                block = block.replace(/Authors:\s*(.+)/, '<div class="paper-authors">👥 $1</div>');
                // 提取 Summary
                block = block.replace(/Summary:\s*(.+)/, '<div class="paper-summary">$1</div>');
                return '<div class="paper-block">' + block + '</div>';
            });

            // 处理粗体 **text**
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            // 处理 ### 标题
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            // 处理 ## 标题
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');

            return html;
        }

        function addTypingIndicator() {
            removeEmptyState();
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatMessages.appendChild(typingDiv);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function setProcessing(processing) {
            isProcessing = processing;
            sendBtn.disabled = processing;
            chatInput.disabled = processing;
        }

        // ========== 自动调整输入框高度 ==========
        chatInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // ========== 键盘事件 ==========
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // ========== 新建对话 ==========
        function startNewChat() {
            if (isProcessing) return;
            currentWorkflowRunId = null;
            chatMessages.innerHTML = `
                <div class="empty-state">
                    <div class="icon">💬</div>
                    <h3>学术关键词研究助手</h3>
                    <p>输入您的研究关键词，获取专业的学术分析</p>
                </div>
            `;
            setStatus(true, '就绪');
        }

        // ========== 发送消息 ==========
        async function sendMessage() {
            const query = chatInput.value.trim();
            if (!query || isProcessing) return;

            // 清空输入框
            chatInput.value = '';
            chatInput.style.height = 'auto';

            // 添加用户消息
            addMessage('user', query);

            // 显示处理状态
            setProcessing(true);
            setStatus(true, '处理中...');
            addTypingIndicator();

            try {
                const response = await fetch(`${API_BASE_URL}/workflows/run`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        inputs: { keyword: query },
                        response_mode: 'streaming',
                        user: 'web-user-001',
                    }),
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.message || `HTTP ${response.status}: ${response.statusText}`);
                }

                removeTypingIndicator();

                // 处理流式响应
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let botMessageDiv = null;
                let fullText = '';
                let textChunks = [];
                let nodeOutputs = {};
                let workflowStatus = 'running';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (!dataStr) continue;

                            try {
                                const data = JSON.parse(dataStr);
                                const event = data.event;

                                if (event === 'workflow_started') {
                                    currentWorkflowRunId = data.workflow_run_id;
                                }
                                else if (event === 'node_started') {
                                    const nodeTitle = data.data && data.data.title;
                                    if (nodeTitle && !['用户输入', '输出'].includes(nodeTitle)) {
                                        setStatus(true, `🔄 ${nodeTitle}...`);
                                    }
                                }
                                else if (event === 'node_finished') {
                                    const nodeTitle = data.data && data.data.title;
                                    const outputs = data.data && data.data.outputs;
                                    if (nodeTitle && outputs) {
                                        nodeOutputs[nodeTitle] = outputs;
                                    }
                                }
                                else if (event === 'text_chunk') {
                                    const text = (data.data && data.data.text) || '';
                                    if (text) {
                                        textChunks.push(text);
                                        fullText = textChunks.join('');
                                        const formattedHtml = formatMessageContent(fullText);
                                        if (!botMessageDiv) {
                                            botMessageDiv = addMessage('bot', fullText);
                                        } else {
                                            const contentEl = botMessageDiv.querySelector('.message-content');
                                            contentEl.innerHTML = formattedHtml;
                                        }
                                        scrollToBottom();
                                    }
                                }
                                else if (event === 'workflow_finished') {
                                    workflowStatus = 'succeeded';
                                    const outputs = data.data && data.data.outputs;

                                    // 如果没有 text_chunk，用最终 outputs 显示
                                    if (fullText.trim() === '' && outputs) {
                                        fullText = formatWorkflowOutputs(outputs);
                                        if (fullText) {
                                            if (!botMessageDiv) {
                                                botMessageDiv = addMessage('bot', fullText);
                                            } else {
                                                const contentEl = botMessageDiv.querySelector('.message-content');
                                                contentEl.innerHTML = formatMessageContent(fullText);
                                            }
                                        } else {
                                            if (!botMessageDiv) {
                                                botMessageDiv = addMessage('bot', '✅ 工作流执行完成。');
                                            }
                                        }
                                    } else if (fullText.trim() === '') {
                                        if (!botMessageDiv) {
                                            botMessageDiv = addMessage('bot', '✅ 工作流执行完成。');
                                        }
                                    }

                                    // 显示统计信息
                                    if (data.data) {
                                        const elapsed = data.data.elapsed_time ? (data.data.elapsed_time).toFixed(1) : '?';
                                        const tokens = data.data.total_tokens || '?';
                                        const steps = data.data.total_steps || '?';
                                        setStatus(true, `完成 · ${elapsed}s · ${tokens} tokens · ${steps} 步骤`);
                                    }
                                }
                                else if (event === 'error') {
                                    throw new Error(data.message || data.data?.message || '工作流执行错误');
                                }
                            } catch (parseErr) {
                                if (parseErr.message && !parseErr.message.includes('JSON')) {
                                    throw parseErr;
                                }
                                console.warn('SSE 解析警告:', parseErr);
                            }
                        }
                    }
                }

                // 如果流结束但 botMessageDiv 仍为空（异常情况）
                if (!botMessageDiv) {
                    addMessage('bot', '⚠️ 工作流已完成，但未返回文本内容。');
                }

                setStatus(true, '就绪');
            } catch (error) {
                removeTypingIndicator();
                addMessage('bot', `❌ 出错了：${error.message}`);
                setStatus(false, `错误: ${error.message}`);
                console.error('API 错误:', error);
            } finally {
                setProcessing(false);
                chatInput.focus();
            }
        }

        // ========== 格式化 Workflow 输出 ==========
        function formatWorkflowOutputs(outputs) {
            const parts = [];
            for (const [key, value] of Object.entries(outputs)) {
                if (value === null || value === undefined || value === '') continue;
                if (Array.isArray(value) && value.length === 0) continue;

                let displayValue;
                if (Array.isArray(value)) {
                    displayValue = value.map(v => {
                        if (typeof v === 'object') return JSON.stringify(v, null, 2);
                        return String(v);
                    }).join('\n');
                } else if (typeof value === 'object') {
                    displayValue = JSON.stringify(value, null, 2);
                } else {
                    displayValue = String(value);
                }

                if (displayValue) {
                    parts.push(`**${key}**: ${displayValue}`);
                }
            }
            return parts.join('\n\n');
        }
    </script>
</body>
</html>
