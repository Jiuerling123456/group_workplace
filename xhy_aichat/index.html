<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dify Chat 机器人</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f0f0f;
      --sidebar-bg: #1a1a1a;
      --card-bg: #1e1e1e;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --text-secondary: #888;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --user-bubble: #2a2a3e;
      --ai-bubble: #1a1a2e;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s;
    }

    .sidebar.hidden {
      transform: translateX(-100%);
      min-width: 0;
      width: 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .new-chat-btn {
      margin: 12px;
      padding: 10px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }

    .new-chat-btn:hover {
      background: var(--accent-hover);
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conversation-item {
      padding: 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.2s;
      position: relative;
    }

    .conversation-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .conversation-item.active {
      background: rgba(99, 102, 241, 0.15);
    }

    .conversation-item .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .conversation-item .actions {
      display: none;
      gap: 4px;
    }

    .conversation-item:hover .actions {
      display: flex;
    }

    .conversation-item .actions button {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      transition: all 0.2s;
    }

    .conversation-item .actions button:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    .conversation-item .actions button.delete:hover {
      color: var(--danger);
    }

    /* Main Chat Area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      font-size: 18px;
      transition: all 0.2s;
    }

    .menu-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .chat-title {
      font-size: 15px;
      font-weight: 500;
      flex: 1;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
    }

    .status-dot.generating {
      background: var(--accent);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.user .message-avatar {
      background: var(--accent);
    }

    .message.ai .message-avatar {
      background: #2a2a3e;
    }

    .message-content {
      background: var(--ai-bubble);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      position: relative;
    }

    .message.user .message-content {
      background: var(--user-bubble);
    }

    .message-content p {
      margin: 0 0 8px;
    }

    .message-content p:last-child {
      margin-bottom: 0;
    }

    .message-content pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 12px;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      margin: 8px 0;
      font-size: 13px;
    }

    .message-content code {
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }

    .message-content pre code {
      background: none;
      padding: 0;
    }

    .message-content ul, .message-content ol {
      margin: 8px 0;
      padding-left: 20px;
    }

    .message-content li {
      margin: 4px 0;
    }

    .message-feedback {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .message-feedback button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .message-feedback button:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .message-feedback button.liked {
      background: rgba(34, 197, 94, 0.2);
      border-color: var(--success);
      color: var(--success);
    }

    .message-feedback button.disliked {
      background: rgba(239, 68, 68, 0.2);
      border-color: var(--danger);
      color: var(--danger);
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--text-secondary);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .suggested-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .suggested-question {
      padding: 6px 14px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-secondary);
    }

    .suggested-question:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Input Area */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
    }

    .input-wrapper textarea {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 120px;
      min-height: 24px;
    }

    .input-wrapper textarea::placeholder {
      color: var(--text-secondary);
    }

    .send-btn, .stop-btn {
      background: var(--accent);
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: var(--accent-hover);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .stop-btn {
      background: var(--danger);
    }

    .stop-btn:hover {
      background: #dc2626;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      animation: slideIn 0.3s ease;
      max-width: 320px;
    }

    .toast.error {
      background: rgba(239, 68, 68, 0.9);
      color: white;
    }

    .toast.success {
      background: rgba(34, 197, 94, 0.9);
      color: white;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #444;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      text-align: center;
      padding: 40px;
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .empty-state p {
      font-size: 14px;
      max-width: 400px;
      line-height: 1.6;
    }

    /* Rename Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 400px;
      max-width: 90vw;
    }

    .modal h3 {
      margin-bottom: 16px;
      font-size: 16px;
    }

    .modal input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
    }

    .modal input:focus {
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .modal-actions button {
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .modal-actions .cancel {
      background: var(--border);
      color: var(--text);
    }

    .modal-actions .confirm {
      background: var(--accent);
      color: white;
    }

    .modal-actions .confirm:hover {
      background: var(--accent-hover);
    }

    /* Loading spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>💬 会话列表</h2>
    </div>
    <button class="new-chat-btn" onclick="startNewChat()">
      <span>+</span> 新建对话
    </button>
    <div class="conversation-list" id="conversationList">
      <div class="empty-state" style="padding:20px">
        <p style="font-size:13px">暂无会话</p>
      </div>
    </div>
  </aside>

  <!-- Main Chat -->
  <main class="main">
    <div class="chat-header">
      <button class="menu-btn" onclick="toggleSidebar()" title="切换侧边栏">☰</button>
      <span class="chat-title" id="chatTitle">新对话</span>
      <div class="status-indicator">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">就绪</span>
      </div>
    </div>

    <div class="messages-container" id="messagesContainer">
      <div class="empty-state">
        <div class="icon">🤖</div>
        <h3>Dify Chat 机器人</h3>
        <p>基于 Dify API 构建的智能对话助手。输入你的问题，开始对话吧！</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="messageInput"
          placeholder="输入你的问题..."
          rows="1"
          onkeydown="handleKeyDown(event)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送">
          ➤
        </button>
      </div>
    </div>
  </main>

  <!-- Rename Modal -->
  <div class="modal-overlay" id="renameModal" style="display:none">
    <div class="modal">
      <h3>重命名会话</h3>
      <input type="text" id="renameInput" placeholder="输入新名称" maxlength="100">
      <div class="modal-actions">
        <button class="cancel" onclick="closeRenameModal()">取消</button>
        <button class="confirm" onclick="confirmRename()">确认</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== 配置 ====================
    // 通过代理服务器访问，避免 CORS 问题
    const PROXY_BASE = window.location.origin + '/proxy';
    const USER_ID = 'user-' + Math.random().toString(36).substring(2, 10);

    // API 请求辅助函数
    async function apiRequest(path, options = {}) {
      const url = PROXY_BASE + path;
      const headers = {
        'Content-Type': 'application/json',
        ...options.headers,
      };
      return fetch(url, { ...options, headers });
    }

    // ==================== 状态管理 ====================
    const state = {
      currentConversationId: '',
      currentTaskId: '',
      isGenerating: false,
      abortController: null,
      conversations: [],
      messages: [],
    };

    // ==================== DOM 引用 ====================
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    const messagesContainer = $('#messagesContainer');
    const messageInput = $('#messageInput');
    const sendBtn = $('#sendBtn');
    const conversationList = $('#conversationList');
    const chatTitle = $('#chatTitle');
    const statusDot = $('#statusDot');
    const statusText = $('#statusText');
    const sidebar = $('#sidebar');
    const renameModal = $('#renameModal');
    const renameInput = $('#renameInput');
    const toastContainer = $('#toastContainer');

    let renameTargetId = '';

    // ==================== 工具函数 ====================
    function showToast(message, type = 'error') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function simpleMarkdown(text) {
      // 简单的 markdown 渲染
      let html = escapeHtml(text);

      // 代码块
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
        return `<pre><code>${code.trim()}</code></pre>`;
      });

      // 行内代码
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // 粗体
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

      // 斜体
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

      // 换行
      html = html.replace(/\n/g, '<br>');

      // 链接
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent)">$1</a>');

      return html;
    }

    function setGenerating(generating) {
      state.isGenerating = generating;
      if (generating) {
        statusDot.className = 'status-dot generating';
        statusText.textContent = '生成中...';
        sendBtn.style.display = 'none';
        // 添加停止按钮
        if (!$('.stop-btn')) {
          const stopBtn = document.createElement('button');
          stopBtn.className = 'stop-btn';
          stopBtn.title = '停止生成';
          stopBtn.innerHTML = '■';
          stopBtn.onclick = stopGeneration;
          sendBtn.parentElement.appendChild(stopBtn);
        }
        messageInput.disabled = true;
      } else {
        statusDot.className = 'status-dot';
        statusText.textContent = '就绪';
        sendBtn.style.display = '';
        const stopBtn = $('.stop-btn');
        if (stopBtn) stopBtn.remove();
        messageInput.disabled = false;
        messageInput.focus();
      }
    }

    function scrollToBottom() {
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // ==================== 侧边栏 ====================
    function toggleSidebar() {
      sidebar.classList.toggle('hidden');
    }

    // ==================== 功能1: 发送消息 (流式 SSE) ====================
    async function sendMessage() {
      const query = messageInput.value.trim();
      if (!query || state.isGenerating) return;

      // 清除空状态
      const emptyState = messagesContainer.querySelector('.empty-state');
      if (emptyState) emptyState.remove();

      // 添加用户消息
      addMessage('user', query);
      messageInput.value = '';
      messageInput.style.height = 'auto';

      // 添加 AI 占位消息
      const aiMsgEl = addMessage('ai', '');
      const aiContentEl = aiMsgEl.querySelector('.message-content');

      // 显示打字指示器
      aiContentEl.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

      setGenerating(true);
      scrollToBottom();

      const controller = new AbortController();
      state.abortController = controller;

      // 流式超时：60 秒内无任何数据则自动中止
      let streamTimer = null;
      const resetStreamTimer = () => {
        clearTimeout(streamTimer);
        streamTimer = setTimeout(() => controller.abort(), 60000);
      };
      resetStreamTimer();

      try {
        console.log('[发送] conversation_id:', state.currentConversationId || '(空-新对话)');

        const response = await apiRequest('/chat-messages', {
          method: 'POST',
          body: JSON.stringify({
            inputs: {},
            query: query,
            response_mode: 'streaming',
            conversation_id: state.currentConversationId || '',
            user: USER_ID,
          }),
          signal: controller.signal,
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.message || `HTTP ${response.status}: 请求失败`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullAnswer = '';
        let taskId = '';
        let conversationId = '';
        let messageId = '';

        while (true) {
          const { done, value } = await reader.read();
          // 每次收到数据就重置超时
          resetStreamTimer();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const dataStr = line.slice(6).trim();
              if (!dataStr) continue;

              try {
                const data = JSON.parse(dataStr);

                // 提取 conversation_id（可能出现在任意事件中）
                if (data.conversation_id) {
                  conversationId = data.conversation_id;
                }
                if (data.task_id) taskId = data.task_id;
                if (data.message_id) messageId = data.message_id;

                if (data.event === 'message' || data.event === 'agent_message') {
                  fullAnswer += data.answer || '';
                  aiContentEl.innerHTML = simpleMarkdown(fullAnswer);
                  scrollToBottom();
                } else if (data.event === 'message_end') {
                  // 保存消息元数据
                  aiMsgEl.dataset.messageId = messageId;
                  aiMsgEl.dataset.conversationId = conversationId;
                } else if (data.event === 'workflow_started') {
                  console.log('[工作流] 开始, task_id:', data.task_id);
                } else if (data.event === 'workflow_finished') {
                  console.log('[工作流] 完成, status:', data.data?.status);
                } else if (data.event === 'error') {
                  // Dify SSE 错误 — 直接抛出，外层统一处理
                  throw new Error('SSE_ERROR:' + (data.message || data.code || '流式响应错误'));
                }
              } catch (e) {
                // 所有 SSE 处理异常（JSON 解析、Dify 业务错误）都向上抛出
                if (e.message && e.message.startsWith('SSE_ERROR:')) {
                  throw new Error(e.message.replace('SSE_ERROR:', ''));
                }
                console.warn('解析 SSE 数据行失败:', line, e);
              }
            }
          }
        }

        // 更新状态
        if (conversationId) {
          console.log('[接收] conversation_id:', conversationId);
          state.currentConversationId = conversationId;
          state.currentTaskId = taskId;
          chatTitle.textContent = '对话ID: ' + conversationId.substring(0, 8) + '...';
        } else {
          console.warn('[接收] 未收到 conversation_id!');
          chatTitle.textContent = '⚠ 无对话ID';
        }

        // 如果没有内容，显示默认消息
        if (!fullAnswer) {
          aiContentEl.innerHTML = '（无响应内容）';
        }

        // 添加反馈按钮
        if (messageId) {
          addFeedbackButtons(aiMsgEl, messageId);
          // 获取建议问题
          fetchSuggestedQuestions(aiMsgEl, messageId);
        }

        // 刷新会话列表
        refreshConversationList();

      } catch (error) {
        clearTimeout(streamTimer);
        if (error.name === 'AbortError') {
          if (!aiContentEl.innerHTML || aiContentEl.innerHTML.includes('typing-indicator')) {
            aiContentEl.innerHTML = '（请求超时或无响应）';
          }
        } else {
          aiContentEl.innerHTML = `❌ 错误: ${escapeHtml(error.message)}`;
          showToast(error.message, 'error');
        }
      } finally {
        clearTimeout(streamTimer);
        setGenerating(false);
        state.abortController = null;
      }
    }

    function addMessage(role, content) {
      const msgEl = document.createElement('div');
      msgEl.className = `message ${role}`;

      const avatar = role === 'user' ? '👤' : '🤖';
      msgEl.innerHTML = `
        <div class="message-avatar">${avatar}</div>
        <div>
          <div class="message-content">${role === 'ai' ? '' : simpleMarkdown(content)}</div>
        </div>
      `;

      if (role === 'user') {
        msgEl.querySelector('.message-content').innerHTML = simpleMarkdown(content);
      }

      messagesContainer.appendChild(msgEl);
      return msgEl;
    }

    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // 自动调整 textarea 高度
    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
    });

    // ==================== 功能2: 停止响应 ====================
    async function stopGeneration() {
      if (!state.currentTaskId) return;

      try {
        const response = await apiRequest(`/chat-messages/${state.currentTaskId}/stop`, {
          method: 'POST',
          body: JSON.stringify({
            user: USER_ID,
          }),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.message || '停止请求失败');
        }

        // 中断 fetch 请求
        if (state.abortController) {
          state.abortController.abort();
        }

        showToast('已停止生成', 'success');
      } catch (error) {
        showToast('停止失败: ' + error.message, 'error');
      }
    }

    // ==================== 功能3: 消息反馈 (点赞/点踩) ====================
    function addFeedbackButtons(msgEl, messageId) {
      const feedbackDiv = document.createElement('div');
      feedbackDiv.className = 'message-feedback';
      feedbackDiv.innerHTML = `
        <button class="like-btn" onclick="submitFeedback('${messageId}', 'like', this)">👍 赞</button>
        <button class="dislike-btn" onclick="submitFeedback('${messageId}', 'dislike', this)">👎 踩</button>
      `;
      msgEl.querySelector('.message-content').parentElement.appendChild(feedbackDiv);
    }

    async function submitFeedback(messageId, rating, btnEl) {
      const container = btnEl.parentElement;
      const likeBtn = container.querySelector('.like-btn');
      const dislikeBtn = container.querySelector('.dislike-btn');

      // 如果重复点击相同评分，则取消
      if (rating === 'like' && likeBtn.classList.contains('liked')) {
        rating = null;
      } else if (rating === 'dislike' && dislikeBtn.classList.contains('disliked')) {
        rating = null;
      }

      try {
        const body = { user: USER_ID, rating: rating };
        if (rating) body.content = rating === 'like' ? '有帮助' : '不够好';

        const response = await apiRequest(`/messages/${messageId}/feedbacks`, {
          method: 'POST',
          body: JSON.stringify(body),
        });

        if (!response.ok) {
          throw new Error('反馈提交失败');
        }

        // 更新按钮状态
        likeBtn.classList.remove('liked');
        dislikeBtn.classList.remove('disliked');
        if (rating === 'like') likeBtn.classList.add('liked');
        if (rating === 'dislike') dislikeBtn.classList.add('disliked');

        showToast(rating ? '反馈已提交' : '反馈已撤销', 'success');
      } catch (error) {
        showToast('反馈失败: ' + error.message, 'error');
      }
    }

    // ==================== 功能4: 获取建议问题 ====================
    async function fetchSuggestedQuestions(msgEl, messageId) {
      try {
        const response = await apiRequest(
          `/messages/${messageId}/suggested?user=${USER_ID}`,
          { method: 'GET' }
        );

        if (!response.ok) return;

        const data = await response.json();
        if (data.result === 'success' && data.data && data.data.length > 0) {
          const suggestedDiv = document.createElement('div');
          suggestedDiv.className = 'suggested-questions';
          data.data.forEach(q => {
            const btn = document.createElement('button');
            btn.className = 'suggested-question';
            btn.textContent = q;
            btn.onclick = () => {
              messageInput.value = q;
              sendMessage();
            };
            suggestedDiv.appendChild(btn);
          });
          msgEl.querySelector('.message-content').parentElement.appendChild(suggestedDiv);
        }
      } catch (error) {
        console.warn('获取建议问题失败:', error);
      }
    }

    // ==================== 功能5: 会话列表 ====================
    async function refreshConversationList() {
      try {
        const response = await apiRequest(
          `/conversations?user=${USER_ID}&limit=50&sort_by=-updated_at`,
          { method: 'GET' }
        );

        if (!response.ok) throw new Error('获取会话列表失败');

        const data = await response.json();
        state.conversations = data.data || [];
        renderConversationList();
      } catch (error) {
        console.warn('获取会话列表失败:', error);
      }
    }

    function renderConversationList() {
      if (state.conversations.length === 0) {
        conversationList.innerHTML = '<div class="empty-state" style="padding:20px"><p style="font-size:13px">暂无会话</p></div>';
        return;
      }

      conversationList.innerHTML = state.conversations.map(conv => `
        <div class="conversation-item ${conv.id === state.currentConversationId ? 'active' : ''}"
             onclick="loadConversation('${conv.id}')">
          <span class="name">${escapeHtml(conv.name || '新对话')}</span>
          <span class="actions">
            <button class="rename" onclick="event.stopPropagation();openRenameModal('${conv.id}', '${escapeHtml(conv.name || '')}')" title="重命名">✏️</button>
            <button class="delete" onclick="event.stopPropagation();deleteConversation('${conv.id}')" title="删除">🗑️</button>
          </span>
        </div>
      `).join('');
    }

    function startNewChat() {
      state.currentConversationId = '';
      state.currentTaskId = '';
      messagesContainer.innerHTML = `
        <div class="empty-state">
          <div class="icon">🤖</div>
          <h3>Dify Chat 机器人</h3>
          <p>基于 Dify API 构建的智能对话助手。输入你的问题，开始对话吧！</p>
        </div>
      `;
      chatTitle.textContent = '新对话';
      messageInput.focus();

      // 更新侧边栏高亮
      document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
    }

    // ==================== 功能6: 消息历史 ====================
    async function loadConversation(conversationId) {
      state.currentConversationId = conversationId;
      state.currentTaskId = '';

      messagesContainer.innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner"></div><p style="margin-top:8px;color:var(--text-secondary);font-size:13px">加载消息...</p></div>';

      try {
        const response = await apiRequest(
          `/messages?conversation_id=${conversationId}&user=${USER_ID}&limit=100`,
          { method: 'GET' }
        );

        if (!response.ok) throw new Error('获取消息失败');

        const data = await response.json();
        const messages = (data.data || []).reverse(); // 反转以按时间顺序显示

        messagesContainer.innerHTML = '';

        if (messages.length === 0) {
          messagesContainer.innerHTML = `
            <div class="empty-state">
              <div class="icon">💬</div>
              <h3>开始对话</h3>
              <p>这是一个新的会话，发送消息开始对话吧！</p>
            </div>
          `;
        } else {
          messages.forEach(msg => {
            // 用户消息
            if (msg.query) {
              addMessage('user', msg.query);
            }
            // AI 消息
            if (msg.answer) {
              const aiMsgEl = addMessage('ai', msg.answer);
              if (msg.id) {
                aiMsgEl.dataset.messageId = msg.id;
                addFeedbackButtons(aiMsgEl, msg.id);
                // 恢复反馈状态
                if (msg.feedback && msg.feedback.rating) {
                  const container = aiMsgEl.querySelector('.message-feedback');
                  if (container) {
                    if (msg.feedback.rating === 'like') {
                      container.querySelector('.like-btn')?.classList.add('liked');
                    } else if (msg.feedback.rating === 'dislike') {
                      container.querySelector('.dislike-btn')?.classList.add('disliked');
                    }
                  }
                }
              }
            }
          });
        }

        // 更新标题
        const conv = state.conversations.find(c => c.id === conversationId);
        if (conv) {
          chatTitle.textContent = conv.name || '对话';
        }

        // 更新侧边栏高亮
        document.querySelectorAll('.conversation-item').forEach(el => {
          el.classList.toggle('active', el.textContent.includes(conversationId));
        });

        scrollToBottom();
      } catch (error) {
        messagesContainer.innerHTML = `<div class="empty-state"><p>❌ 加载失败: ${escapeHtml(error.message)}</p></div>`;
        showToast('加载消息失败: ' + error.message, 'error');
      }
    }

    // ==================== 功能7: 会话管理 (重命名/删除) ====================
    function openRenameModal(conversationId, currentName) {
      renameTargetId = conversationId;
      renameInput.value = currentName || '';
      renameModal.style.display = 'flex';
      renameInput.focus();
      renameInput.select();
    }

    function closeRenameModal() {
      renameModal.style.display = 'none';
      renameTargetId = '';
    }

    async function confirmRename() {
      const newName = renameInput.value.trim();
      if (!newName || !renameTargetId) return;

      try {
        const response = await apiRequest(`/conversations/${renameTargetId}/name`, {
          method: 'POST',
          body: JSON.stringify({
            name: newName,
            user: USER_ID,
          }),
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.message || '重命名失败');
        }

        chatTitle.textContent = newName;
        closeRenameModal();
        await refreshConversationList();
        showToast('重命名成功', 'success');
      } catch (error) {
        showToast('重命名失败: ' + error.message, 'error');
      }
    }

    async function deleteConversation(conversationId) {
      if (!confirm('确定要删除这个会话吗？此操作不可撤销。')) return;

      try {
        const response = await apiRequest(`/conversations/${conversationId}`, {
          method: 'DELETE',
          body: JSON.stringify({
            user: USER_ID,
          }),
        });

        if (!response.ok && response.status !== 204) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.message || '删除失败');
        }

        // 如果删除的是当前会话，则开始新对话
        if (state.currentConversationId === conversationId) {
          startNewChat();
        }

        await refreshConversationList();
        showToast('会话已删除', 'success');
      } catch (error) {
        showToast('删除失败: ' + error.message, 'error');
      }
    }

    // 关闭重命名弹窗 (点击遮罩)
    renameModal.addEventListener('click', (e) => {
      if (e.target === renameModal) closeRenameModal();
    });

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeRenameModal();
      }
    });

    // ==================== 初始化 ====================
    async function init() {
      await refreshConversationList();
      messageInput.focus();
      console.log(`Dify Chat 初始化完成 | User ID: ${USER_ID}`);
    }

    init();
  </script>
</body>
</html>
