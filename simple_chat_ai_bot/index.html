<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dify Chat 机器人</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- 侧边栏：会话列表 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">🤖</span>
          <span class="logo-text">Dify Chat</span>
        </div>
        <button class="btn-new-chat" id="btnNewChat" title="新建对话">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>新建对话</span>
        </button>
      </div>
      <div class="conversation-list" id="conversationList">
        <!-- 会话项动态生成 -->
      </div>
      <div class="sidebar-footer">
        <button class="btn-settings" id="btnSettings" title="设置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span>设置</span>
        </button>
      </div>
    </aside>

    <!-- 主聊天区域 -->
    <main class="chat-main">
      <header class="chat-header">
        <button class="btn-toggle-sidebar" id="btnToggleSidebar" title="切换侧边栏">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="chat-title" id="chatTitle">新对话</div>
        <div class="header-actions">
          <button class="btn-icon" id="btnAppInfo" title="应用信息">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          </button>
        </div>
      </header>

      <!-- 消息区域 -->
      <div class="messages-container" id="messagesContainer">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">🤖</div>
          <h1 id="welcomeTitle">欢迎使用 Dify Chat</h1>
          <p id="welcomeDesc">开始一段新的对话，我会尽力帮助你。</p>
        </div>
        <div class="messages-list" id="messagesList">
          <!-- 消息动态生成 -->
        </div>
        <div class="typing-indicator" id="typingIndicator" style="display:none;">
          <span></span><span></span><span></span>
        </div>
      </div>

      <!-- 输入区域 -->
      <footer class="chat-footer">
        <!-- 文件预览区 -->
        <div class="file-preview-list" id="filePreviewList"></div>
        <!-- 输入变量区（如果有） -->
        <div class="input-variables" id="inputVariables"></div>
        <div class="input-wrapper">
          <button class="btn-icon btn-attach" id="btnAttach" title="上传文件">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="file" id="fileInput" hidden multiple />
          <button class="btn-icon btn-mic" id="btnMic" title="语音输入">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <textarea id="messageInput" class="message-input" placeholder="输入消息..." rows="1"></textarea>
          <button class="btn-icon btn-stop" id="btnStop" title="停止生成" style="display:none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
          <button class="btn-send" id="btnSend" title="发送">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="input-hint">
          <span>按 Enter 发送，Shift+Enter 换行</span>
        </div>
      </footer>
    </main>
  </div>

  <!-- 设置弹窗 -->
  <div class="modal-overlay" id="settingsModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2>设置</h2>
        <button class="btn-close" data-close="settingsModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Base URL</label>
          <input type="text" id="settingBaseUrl" value="https://api.dify.ai/v1" />
        </div>
        <div class="form-group">
          <label>API Key</label>
          <input type="text" id="settingApiKey" value="app-eOcN4IAacPJDgAeoJ8RBugyJ" />
        </div>
        <div class="form-group">
          <label>用户标识</label>
          <input type="text" id="settingUser" value="user-123" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="btnSaveSettings">保存</button>
      </div>
    </div>
  </div>

  <!-- 应用信息弹窗 -->
  <div class="modal-overlay" id="appInfoModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2>应用信息</h2>
        <button class="btn-close" data-close="appInfoModal">&times;</button>
      </div>
      <div class="modal-body" id="appInfoBody">
        <p>加载中...</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" data-close="appInfoModal">关闭</button>
      </div>
    </div>
  </div>

  <!-- 录音弹窗 -->
  <div class="modal-overlay" id="recordingModal" style="display:none;">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>语音输入</h2>
        <button class="btn-close" id="btnStopRecording">&times;</button>
      </div>
      <div class="modal-body recording-body">
        <div class="recording-icon">🎙️</div>
        <p id="recordingStatus">录音中...</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="btnCancelRecording">取消</button>
        <button class="btn btn-primary" id="btnFinishRecording">完成</button>
      </div>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 音频播放器 -->
  <audio id="audioPlayer"></audio>

  <script src="dify-api.js"></script>
  <script src="app.js"></script>
</body>
</html>
